# This repository is a Home Assistant HACS custom component, not a published
# Python package. The SHMÚ client library is vendored under
# custom_components/shmu/shmu_opendata/ (kept HA-free so it stays swappable).
# This file only holds dev-tooling configuration.

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "aioresponses>=0.7.6",
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest-homeassistant-custom-component",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
# Strict-type only the vendored library, analysed in isolation as the
# top-level package `shmu_opendata`. Putting its parent dir on mypy_path
# (with explicit_package_bases) stops mypy from importing the HA-dependent
# custom_components.shmu package just to resolve the parent.
mypy_path = "custom_components/shmu"
explicit_package_bases = true
namespace_packages = true
files = ["custom_components/shmu/shmu_opendata"]
