name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR branch cancels the previous, still-running CI for it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv + Python 3.13
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
          enable-cache: true

      # setup-uv only exports UV_PYTHON; it does not create a venv (its
      # implicit venv behavior changed across major versions), so own the
      # venv lifecycle explicitly here. Later steps call .venv/bin/* directly.
      - name: Create virtualenv
        run: uv venv --python 3.13 .venv

      # Dev deps come from the [dependency-groups] table in pyproject.toml
      # (single source of truth); installed into the .venv created above.
      - name: Install dev dependencies
        run: uv pip install --group dev

      - name: ruff check
        run: .venv/bin/ruff check custom_components/ tests/

      - name: ruff format --check
        run: .venv/bin/ruff format --check custom_components/ tests/

      - name: mypy (strict, vendored library)
        run: .venv/bin/python -m mypy

      - name: pytest (offline)
        run: .venv/bin/python -m pytest tests/

  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: HACS Action
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main
        with:
          category: integration
          # 'brands' requires the integration to be registered in
          # home-assistant/brands, which only happens on a HA-core/HACS-default
          # submission. This is an unpublished custom repo by design (see
          # README "Why HACS"), so the brands check can never pass here and is
          # unrelated to the lint/type/test quality gate.
          ignore: brands
