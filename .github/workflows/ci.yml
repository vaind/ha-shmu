name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up uv + Python 3.13
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          python-version: "3.13"
          enable-cache: true

      # Required: setup-uv only exports UV_PYTHON, it does not create a venv
      # (its implicit venv behavior is unstable across majors). Later steps
      # invoke .venv/bin/* directly — do not drop this step.
      - name: Create virtualenv
        run: uv venv --python 3.13 .venv

      - name: Install dev dependencies
        run: uv pip install --group dev

      - name: ruff check
        run: .venv/bin/ruff check custom_components/ tests/

      - name: ruff format --check
        run: .venv/bin/ruff format --check custom_components/ tests/

      - name: mypy (strict, vendored library)
        run: .venv/bin/python -m mypy

      - name: pytest (offline)
        run: .venv/bin/python -m pytest tests/

  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: HACS Action
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main
        with:
          category: integration
          # home-assistant/brands no longer accepts custom-component PRs
          # (HA 2026.3 Brands Proxy API, 2026-02-24): icons now ship in
          # custom_components/shmu/brand/ and HA serves them locally. The
          # HACS Action's 'brands' check still queries the brands CDN,
          # which has no entry for a bundled custom repo, so it stays
          # ignored rather than failing on an obsolete requirement.
          ignore: brands
