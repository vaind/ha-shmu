name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up uv + Python 3.13
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true

      # Required: setup-uv only exports UV_PYTHON, it does not create a venv
      # (its implicit venv behavior is unstable across majors). Later steps
      # invoke .venv/bin/* directly — do not drop this step.
      - name: Create virtualenv
        run: uv venv --python 3.13 .venv

      - name: Install dev dependencies
        run: uv pip install --group dev

      - name: ruff check
        run: .venv/bin/ruff check custom_components/ tests/

      - name: ruff format --check
        run: .venv/bin/ruff format --check custom_components/ tests/

      - name: mypy (strict, vendored library)
        run: .venv/bin/python -m mypy

      - name: pytest (offline)
        run: .venv/bin/python -m pytest tests/

  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89 # master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: HACS Action
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration
